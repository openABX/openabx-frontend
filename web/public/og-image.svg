<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="OpenABX — open-source UI for AlphBanX">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050a08"/>
      <stop offset="100%" stop-color="#081814"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2eff9a"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#2eff9a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2eff9a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- logo mark -->
  <g transform="translate(80, 90)">
    <circle cx="32" cy="32" r="28" fill="none" stroke="url(#brand)" stroke-width="5"/>
    <circle cx="32" cy="32" r="10" fill="url(#brand)"/>
  </g>
  <text x="160" y="130" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="28" font-weight="600" fill="#9fb3aa" letter-spacing="3">OPENABX</text>

  <!-- headline -->
  <text x="80" y="300" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="78" font-weight="700" fill="#f4fff9" letter-spacing="-2">
    Borrow, earn, redeem ABD.
  </text>
  <text x="80" y="380" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="78" font-weight="700" letter-spacing="-2" fill="url(#brand)">
    Clean-room. Open source.
  </text>

  <!-- subtitle -->
  <text x="80" y="450" font-family="Inter, system-ui, -apple-system, Segoe UI, sans-serif" font-size="26" font-weight="400" fill="#7a8c84">
    A community UI for the AlphBanX stablecoin protocol on Alephium.
  </text>

  <!-- footer row -->
  <g transform="translate(80, 530)">
    <rect x="0" y="0" width="180" height="40" rx="20" fill="#2eff9a" fill-opacity="0.12" stroke="#2eff9a" stroke-opacity="0.4"/>
    <text x="90" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#2eff9a">Pre-audit beta</text>

    <rect x="200" y="0" width="150" height="40" rx="20" fill="#0ea5e9" fill-opacity="0.12" stroke="#0ea5e9" stroke-opacity="0.4"/>
    <text x="275" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#0ea5e9">MIT licensed</text>

    <rect x="370" y="0" width="230" height="40" rx="20" fill="#ffffff" fill-opacity="0.06" stroke="#ffffff" stroke-opacity="0.15"/>
    <text x="485" y="26" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#c4d6cd">Unaffiliated with AlphBanX</text>
  </g>

  <text x="1120" y="600" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#4a574f">github.com/openabx</text>
</svg>
